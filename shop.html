<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Grind</title>
    <link rel="stylesheet" href="styles.css">
    <script src="cart.js" defer></script>
</head>
<body>
    <header>
        <nav class="fixed-header">
            <div class="logo">Coffee Grind</div>
            <div class="cart-icon">
                <img src="cart-icon.png" alt="Cart">
                <span class="cart-count">0</span>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <h1>Our Products</h1>
            <div class="product" data-id="1" data-name="Coffee Beans" data-price="10.99">
                <h2>Coffee Beans</h2>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product" data-id="2" data-name="Espresso Beans" data-price="12.99">
                <h2>Espresso Beans</h2>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Coffee Grind</p>
    </footer>
</body>
</html>
