<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee and Grind Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h1>Our Products</h1>
            <div class="product-grid">
                <div class="product">
                    <img src="coffee1.jpg" alt="Coffee Product 1">
                    <h2>Coffee 1</h2>
                    <p>Delicious coffee blend with rich flavor.</p>
                    <span>$9.99</span>
                </div>
                <div class="product">
                    <img src="coffee2.jpg" alt="Coffee Product 2">
                    <h2>Coffee 2</h2>
                    <p>Aromatic coffee blend for morning bliss.</p>
                    <span>$10.99</span>
                </div>
                <div class="product">
                    <img src="coffee3.jpg" alt="Coffee Product 3">
                    <h2>Coffee 3</h2>
                    <p>Smooth coffee blend for a relaxing evening.</p>
                    <span>$11.99</span>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Coffee and Grind Shop. All rights reserved.</p>
    </footer>

</html>
