* {

  box-sizing: border-box;
}

body {
  font-family: "Times New Roman", serif;
  background-color: #D39858;
  color: #150c0c;
}

a {
  text-decoration: none;
  color: inherit;
}

.hero-section {
  background: linear-gradient(
    90deg,
    #D39858 0%,
    #C6863B 37%,

}

.navbar {

}

.brand {

.brand img {

}

.brand-text h1 {

  letter-spacing: 2px;

}

.shop-title {
  text-align: center;
  padding: 60px 20px;
  font-size: 42px;
}

.product-section {
  padding: 40px 60px 80px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.product-card {
  background: #f2c07b;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
}

.product-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

.product-card h3 {
